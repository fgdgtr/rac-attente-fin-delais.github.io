<!-- SEULE PARTIE MODIFIÉE IMPORTANTE -->
<script>
const FIREBASE = 'https://rac-attente-fin-delais-default-rtdb.europe-west1.firebasedatabase.app/.json';

let state = {}, saveTimer = null;

/* INIT STATE */
function initState() {
  const s = {};
  ['D','C','B','A'].forEach(e => {
    for(let i=1;i<=6;i++) s[`${e}${i}`]={palettes:[]};
  });
  return s;
}

function migrate(data) {
  const s = data || initState();
  ['D','C','B','A'].forEach(e => {
    for(let i=1;i<=6;i++) {
      const id=`${e}${i}`;
      if(!s[id]) s[id]={palettes:[]};
      if(!s[id].palettes) s[id].palettes=[];
    }
  });
  return s;
}

/* SYNC UI */
function setSyncDot(st) {
  const dot = document.getElementById('sync-dot');
  const txt = document.getElementById('sync-time');

  dot.className = 'sync-dot ' + st;

  if(st==='ok') txt.textContent = 'OK';
  else if(st==='loading') txt.textContent = '...';
  else txt.textContent = 'OFF';
}

/* LOAD */
async function loadFromServer() {
  setSyncDot('loading');
  try {
    const res = await fetch(FIREBASE);
    if (!res.ok) throw new Error();

    let data = await res.json();

    // 🔥 FIX PRINCIPAL
    if (!data) {
      console.log("Firebase vide → init");
      data = initState();
    }

    state = migrate(data);

    setSyncDot('ok');
    renderRack();

  } catch (e) {
    console.error(e);

    try {
      const local = localStorage.getItem('rack');
      state = local ? migrate(JSON.parse(local)) : initState();
    } catch {
      state = initState();
    }

    setSyncDot('error');
    renderRack();
  }
}

/* SAVE */
async function saveToServer() {
  setSyncDot('loading');
  try {
    await fetch(FIREBASE, {
      method: 'PUT',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(state)
    });

    localStorage.setItem('rack', JSON.stringify(state));
    setSyncDot('ok');

  } catch {
    localStorage.setItem('rack', JSON.stringify(state));
    setSyncDot('error');
  }
}

function scheduleSave() {
  clearTimeout(saveTimer);
  saveTimer = setTimeout(saveToServer, 500);
}

/* TEST RENDER SIMPLE */
function renderRack() {
  const el = document.getElementById('rack-grid');
  el.innerHTML = '';

  Object.keys(state).forEach(id => {
    const div = document.createElement('div');
    div.style.padding = '10px';
    div.style.border = '1px solid #ccc';
    div.style.margin = '5px';
    div.innerHTML = `<b>${id}</b> (${state[id].palettes.length} palettes)`;

    div.onclick = () => {
      state[id].palettes.push({
        ref: "TEST",
        status: "green"
      });
      renderRack();
      scheduleSave();
    };

    el.appendChild(div);
  });
}

/* START */
loadFromServer();
</script>
